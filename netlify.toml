[build]
  publish = "."
  functions = "netlify/functions"

# ── ROOT: Serve gate as landing page ─────────
[[redirects]]
  from = "/"
  to = "/gate.html"
  status = 200
  force = false

# ── PLATFORM: Authenticated access routes ─────────
[[redirects]]
  from = "/platform"
  to = "/warroom-billion.html"
  status = 200

[[redirects]]
  from = "/access"
  to = "/warroom-billion.html"
  status = 200

# ── SECURITY: Block direct access to sensitive markdown files ─
# force = true required because files exist as static assets
# These MUST come before the API splat redirect

[[redirects]]
  from = "/CLAUDE.md"
  to = "/index.html"
  status = 301
  force = true

[[redirects]]
  from = "/EXPANSION-PLAN.md"
  to = "/index.html"
  status = 301
  force = true

[[redirects]]
  from = "/README.md"
  to = "/index.html"
  status = 301
  force = true

# ── API proxy ─────────────────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."scraper"]
  type = "background"

[functions."generate-report"]
  type = "background"

# ── SUBDOMAIN: Custom domain support ─────────────────────────
# directory.theaurigen.com serves the same content as aurigendirectory.com
# Redirect www to canonical
[[redirects]]
  from = "https://www.aurigendirectory.com/*"
  to = "https://aurigendirectory.com/:splat"
  status = 301
  force = true

# Redirect www subdomain variant
[[redirects]]
  from = "https://www.directory.theaurigen.com/*"
  to = "https://directory.theaurigen.com/:splat"
  status = 301
  force = true

# ── SECURITY: Prevent indexing of markdown files ──────────────
[[headers]]
  for = "/*.md"
  [headers.values]
    X-Robots-Tag = "noindex"

# ── SECURITY: Global security headers ─────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://*.netlify.app https://api.leadconnectorhq.com https://api.beehiiv.com; frame-src https://js.stripe.com https://api.leadconnectorhq.com;"
