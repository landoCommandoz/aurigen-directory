name: Weekly Auction Scraper

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scraper
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "x-scraper-secret: ${{ secrets.SCRAPER_SECRET }}" \
            "${{ secrets.NETLIFY_SCRAPER_URL }}")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "HTTP $http_code"
          echo "$body"
          if [ "$http_code" != "200" ] && [ "$http_code" != "202" ]; then
            echo "::error::Scraper returned HTTP $http_code"
            exit 1
          fi
          echo "Scraper triggered successfully"
