name: Weekly Auction & Property Scraper

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger auction scraper
        run: |
          echo "=== Step 1: Auction scraper ==="
          curl -s --max-time 280 -w "\nHTTP %{http_code}\n" \
            -X POST \
            -H "x-scraper-secret: ${{ secrets.SCRAPER_SECRET }}" \
            "${{ secrets.NETLIFY_SCRAPER_URL }}" || true
          echo "Auction scraper triggered (fire-and-forget)"

      - name: Wait for auctions to populate
        run: sleep 15

      - name: Trigger property scraper (background)
        run: |
          echo "=== Step 2: Property scraper (background) ==="
          PROP_URL="${{ secrets.NETLIFY_SCRAPER_URL }}"
          PROP_URL=$(echo "$PROP_URL" | sed 's|/scraper$|/scrape-properties-background|')
          curl -s --max-time 280 -w "\nHTTP %{http_code}\n" \
            -X POST \
            -H "x-scraper-secret: ${{ secrets.SCRAPER_SECRET }}" \
            "$PROP_URL" || true
          echo "Property scraper triggered (fire-and-forget)"

      - name: Wait for property scraper to populate data
        run: sleep 30

      - name: Calculate Opportunity Scores
        run: |
          echo "=== Step 3: Calculate Opportunity Scores ==="
          SCORE_URL="${{ secrets.NETLIFY_SCRAPER_URL }}"
          SCORE_URL=$(echo "$SCORE_URL" | sed 's|/scraper$|/calculate-scores|')
          curl -s --max-time 280 -w "\nHTTP %{http_code}\n" \
            -X POST \
            -H "x-scraper-secret: ${{ secrets.SCRAPER_SECRET }}" \
            "$SCORE_URL" || true
          echo "Opportunity Scores triggered (fire-and-forget)"

      - name: Wait for scores to finalize
        run: sleep 15

      - name: Track Redemptions
        run: |
          echo "=== Step 4: Track Redemptions ==="
          REDEEM_URL="${{ secrets.NETLIFY_SCRAPER_URL }}"
          REDEEM_URL=$(echo "$REDEEM_URL" | sed 's|/scraper$|/track-redemptions|')
          curl -s --max-time 280 -w "\nHTTP %{http_code}\n" \
            -X POST \
            -H "x-scraper-secret: ${{ secrets.SCRAPER_SECRET }}" \
            "$REDEEM_URL" || true
          echo "Redemption tracking triggered (fire-and-forget)"

      - name: Generate Weekly Intelligence Report
        run: |
          echo "=== Step 5: Generate Weekly Report ==="
          REPORT_URL="${{ secrets.NETLIFY_SCRAPER_URL }}"
          REPORT_URL=$(echo "$REPORT_URL" | sed 's|/scraper$|/generate-report|')
          curl -s --max-time 280 -w "\nHTTP %{http_code}\n" \
            -X POST \
            -H "x-scraper-secret: ${{ secrets.SCRAPER_SECRET }}" \
            "$REPORT_URL" || true
          echo "Weekly report triggered (fire-and-forget)"

      - name: Wait before state laws scrape
        run: sleep 15

      - name: Scrape State Laws
        run: |
          echo "=== Step 6: State Law Intelligence ==="
          LAWS_URL="${{ secrets.NETLIFY_SCRAPER_URL }}"
          LAWS_URL=$(echo "$LAWS_URL" | sed 's|/scraper$|/scrape-state-laws|')
          curl -s --max-time 280 -w "\nHTTP %{http_code}\n" \
            -X POST \
            -H "x-scraper-secret: ${{ secrets.SCRAPER_SECRET }}" \
            "$LAWS_URL" || true
          echo "State law intelligence triggered (fire-and-forget)"

  puppeteer-scrape:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 \
            libcairo2 libasound2 libatspi2.0-0

      - name: Install dependencies
        run: |
          cd netlify/functions/scraper
          npm init -y 2>/dev/null || true
          npm install puppeteer @supabase/supabase-js

      - name: Run Puppeteer scrapers (RealAuction + GovEase)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node netlify/functions/scraper/run-puppeteer.js
