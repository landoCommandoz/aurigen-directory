<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Aurigen County Resource Directory</title>
  <meta name="description" content="Tax lien and tax deed investor research platform. Auction schedules, interest rates, redemption periods, and county links for all 50 states + DC.">

  <!-- OG -->
  <meta property="og:title" content="Aurigen County Resource Directory">
  <meta property="og:description" content="The research edge every tax investor needs. 51 jurisdictions. Auction calendars. County links.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://aurigen-directory.netlify.app">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/gate.css">
  <link rel="stylesheet" href="/css/nav.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>">
</head>
<body>

  <!-- Skip Navigation — A11y -->
  <a href="#main" class="skip-link">Skip to main content</a>

  <!-- Gate Screen — Level 0 -->
  <div id="gate"></div>

  <!-- App Shell — Level 1+ -->
  <div id="app" hidden>
    <main id="main">
      <div id="tab-content"></div>
    </main>
    <nav id="bottom-nav" role="navigation" aria-label="Main navigation"></nav>
  </div>

  <!-- Modals -->
  <div id="modals"></div>

  <!-- State Data Loader -->
  <script>
  (function () {
    var lang = 'en';
    try { lang = localStorage.getItem('aurigen_lang') || 'en'; } catch (e) {}
    if (lang !== 'es') lang = 'en';
    window._initialLang = lang;

    var token = null;
    try { token = localStorage.getItem('aug_token'); } catch (e) {}

    var headers = {};
    if (token) headers['Authorization'] = 'Bearer ' + token;

    // Load state data from serverless function + v2 enhanced data in parallel
    var statesFetch = fetch('/.netlify/functions/get-states?lang=' + lang, { headers: headers })
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(function (js) { new Function(js)(); })
      .catch(function (e) { console.error('[INIT] State data load failed:', e); });

    var v2Fetch = import('./states-data-v2.js')
      .then(function (mod) { window.STATES_V2 = mod.statesData; })
      .catch(function (e) { console.error('[INIT] V2 data load failed:', e); });

    window._stateDataReady = Promise.all([statesFetch, v2Fetch]);
  })();
  </script>

  <!-- Core JS — load order matters -->
  <script src="/js/access.js"></script>
  <script src="/js/language.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/gate.js"></script>
  <script src="/js/app.js"></script>

</body>
</html>
