<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Aurigen County Resource Directory</title>
  <meta name="description" content="Tax lien and tax deed investor research platform. Auction schedules, interest rates, redemption periods, and county links for all 50 states + DC.">

  <!-- OG -->
  <meta property="og:title" content="Aurigen County Resource Directory">
  <meta property="og:description" content="The research edge every tax investor needs. 51 jurisdictions. Auction calendars. County links.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://aurigen-directory.netlify.app">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/gate.css">
  <link rel="stylesheet" href="/css/nav.css">
  <link rel="stylesheet" href="/css/map.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>">
</head>
<body>

  <!-- Skip Navigation — A11y -->
  <a href="#main" class="skip-link">Skip to main content</a>

  <!-- Gate Screen — Level 0 -->
  <div id="gate"></div>

  <!-- App Shell — Level 1+ -->
  <div id="app" hidden>
    <main id="main">
      <div id="tab-content"></div>
    </main>
    <nav id="bottom-nav" role="navigation" aria-label="Main navigation"></nav>
  </div>

  <!-- Modals -->
  <div id="modals"></div>

  <!-- State Data — static script tags, no serverless dependency -->
  <script src="/states-en.js"></script>
  <script src="/states-es.js"></script>
  <script src="/states-data-v2.js"></script>

  <!-- Language detection -->
  <script>
  (function () {
    var lang = 'en';
    try { lang = localStorage.getItem('aurigen_lang') || 'en'; } catch (e) {}
    if (lang !== 'es') lang = 'en';
    window._initialLang = lang;

    // Verify data loaded — log visibly if missing
    if (!window.STATES_EN || !window.STATES_EN.length) console.error('[INIT] STATES_EN missing or empty — states-en.js failed to load');
    if (!window.STATES_ES || !window.STATES_ES.length) console.error('[INIT] STATES_ES missing or empty — states-es.js failed to load');
    if (!window.STATES_V2 || !window.STATES_V2.length) console.error('[INIT] STATES_V2 missing or empty — states-data-v2.js failed to load');

    // Data is already in memory — signal ready immediately
    window._stateDataReady = Promise.resolve();
  })();
  </script>

  <!-- D3 + TopoJSON for geographic map -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

  <!-- Core JS — load order matters -->
  <script src="/js/access.js"></script>
  <script src="/js/language.js"></script>
  <script src="/js/map.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/gate.js"></script>
  <script src="/js/app.js"></script>

</body>
</html>
